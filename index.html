<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revo Browser</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="browser-container">
    <!-- Title Bar -->
    <div class="title-bar">
      <div class="title-bar-logo">
        <i class="fas fa-bolt"></i>
        <span>Revo Browser</span>
      </div>
      <div class="title-bar-drag"></div>
      <div class="window-controls">
        <button class="window-btn minimize" id="minimizeBtn" title="Minimize">
          <i class="fas fa-minus"></i>
        </button>
        <button class="window-btn maximize" id="maximizeBtn" title="Maximize">
          <i class="fas fa-square"></i>
        </button>
        <button class="window-btn close" id="closeBtn" title="Close">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tabs-container" id="tabsContainer">
        <!-- Tabs will be dynamically added -->
      </div>
      <button class="new-tab-btn" id="newTabBtn">
        <i class="fas fa-plus"></i>
      </button>
    </div>

    <!-- Navigation Bar -->
    <div class="nav-bar">
      <div class="nav-controls">
        <button class="nav-btn" id="backBtn" title="Go Back (Alt+Left)">
          <i class="fas fa-chevron-left"></i>
        </button>
        <button class="nav-btn" id="forwardBtn" title="Go Forward (Alt+Right)">
          <i class="fas fa-chevron-right"></i>
        </button>
        <button class="nav-btn" id="refreshBtn" title="Refresh (F5)">
          <i class="fas fa-redo"></i>
        </button>
        <button class="nav-btn" id="homeBtn" title="Home">
          <i class="fas fa-home"></i>
        </button>
      </div>

      <div class="url-bar-container">
        <div class="url-bar" id="urlBar">
          <span class="url-icon" id="urlIcon">
            <i class="fas fa-search"></i>
          </span>
          <input 
            type="text" 
            class="url-input" 
            id="urlInput" 
            placeholder="Search or enter address"
            autocomplete="off"
          >
          <button class="url-action-btn" id="bookmarkBtn" title="Bookmark this page">
            <i class="far fa-star"></i>
          </button>
        </div>
        <div class="url-suggestions" id="urlSuggestions"></div>
      </div>

      <div class="menu-controls">
        <button class="menu-btn" id="extensionsBtn" title="Extensions">
          <i class="fas fa-puzzle-piece"></i>
        </button>
        <button class="menu-btn" id="themeBtn" title="Toggle Theme">
          <i class="fas fa-moon"></i>
        </button>
        <button class="menu-btn" id="menuBtn" title="Menu">
          <i class="fas fa-ellipsis-v"></i>
        </button>
      </div>
    </div>

    <!-- Bookmarks Bar -->
    <div class="bookmarks-bar" id="bookmarksBar">
      <div class="bookmarks-container" id="bookmarksContainer">
        <!-- Bookmarks will be dynamically added -->
      </div>
    </div>

    <!-- Content Area -->
    <div class="content-area">
      <div class="views-container" id="viewsContainer">
        <!-- Web views will be dynamically added -->
      </div>
      
      <!-- New Tab Page -->
      <div class="new-tab-page active" id="newTabPage">
        <div class="ntp-content">
          <div class="logo-section">
            <div class="browser-logo">
              <div class="logo-circle">
                <i class="fas fa-bolt"></i>
              </div>
              <h1 class="logo-text">Revo</h1>
            </div>
            <div class="search-container">
              <div class="ntp-search-bar">
                <i class="fas fa-search search-icon"></i>
                <input 
                  type="text" 
                  class="ntp-search-input" 
                  id="ntpSearchInput"
                  placeholder="Search the web..."
                >
              </div>
            </div>
          </div>

          <div class="quick-links">
            <h3 class="quick-links-title">Quick Links</h3>
            <div class="quick-links-grid" id="quickLinksGrid">
              <div class="quick-link" data-url="https://google.com">
                <div class="quick-link-icon google">
                  <i class="fab fa-google"></i>
                </div>
                <span class="quick-link-label">Google</span>
              </div>
              <div class="quick-link" data-url="https://youtube.com">
                <div class="quick-link-icon youtube">
                  <i class="fab fa-youtube"></i>
                </div>
                <span class="quick-link-label">YouTube</span>
              </div>
              <div class="quick-link" data-url="https://github.com">
                <div class="quick-link-icon github">
                  <i class="fab fa-github"></i>
                </div>
                <span class="quick-link-label">GitHub</span>
              </div>
              <div class="quick-link" data-url="https://reddit.com">
                <div class="quick-link-icon reddit">
                  <i class="fab fa-reddit"></i>
                </div>
                <span class="quick-link-label">Reddit</span>
              </div>
              <div class="quick-link" data-url="https://twitter.com">
                <div class="quick-link-icon twitter">
                  <i class="fab fa-twitter"></i>
                </div>
                <span class="quick-link-label">Twitter</span>
              </div>
              <div class="quick-link add-new">
                <div class="quick-link-icon">
                  <i class="fas fa-plus"></i>
                </div>
                <span class="quick-link-label">Add</span>
              </div>
            </div>
          </div>

          <div class="ntp-footer">
            <div class="ntp-shortcuts">
              <button class="ntp-shortcut-btn" id="showHistoryBtn">
                <i class="fas fa-history"></i>
                <span>History</span>
              </button>
              <button class="ntp-shortcut-btn" id="showDownloadsBtn">
                <i class="fas fa-download"></i>
                <span>Downloads</span>
              </button>
              <button class="ntp-shortcut-btn" id="showBookmarksBtn">
                <i class="fas fa-bookmark"></i>
                <span>Bookmarks</span>
              </button>
              <button class="ntp-shortcut-btn" id="showSettingsBtn">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <span class="status-text" id="statusText">Ready</span>
      <div class="status-indicators">
        <span class="indicator" id="secureIndicator" title="Secure Connection">
          <i class="fas fa-lock"></i>
        </span>
        <span class="indicator" id="readerModeIndicator" title="Reader Mode">
          <i class="fas fa-book-reader"></i>
        </span>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <div class="context-menu-item" data-action="back">
      <i class="fas fa-arrow-left"></i>
      <span>Back</span>
    </div>
    <div class="context-menu-item" data-action="forward">
      <i class="fas fa-arrow-right"></i>
      <span>Forward</span>
    </div>
    <div class="context-menu-item" data-action="refresh">
      <i class="fas fa-redo"></i>
      <span>Refresh</span>
    </div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-item" data-action="bookmark">
      <i class="far fa-star"></i>
      <span>Add to Bookmarks</span>
    </div>
    <div class="context-menu-item" data-action="save">
      <i class="fas fa-download"></i>
      <span>Save Page As</span>
    </div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-item" data-action="inspect">
      <i class="fas fa-code"></i>
      <span>Inspect Element</span>
    </div>
  </div>

  <!-- Sidebar Panel -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3 class="sidebar-title" id="sidebarTitle">Bookmarks</h3>
      <button class="sidebar-close" id="sidebarClose">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="sidebar-content" id="sidebarContent">
      <!-- Sidebar content will be dynamically loaded -->
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="modal-close" id="settingsModalClose">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="settings-section">
          <h3>Appearance</h3>
          <div class="setting-item">
            <label>Theme</label>
            <select id="themeSelect" class="setting-select">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="auto">Auto</option>
            </select>
          </div>
          <div class="setting-item">
            <label>Show Bookmarks Bar</label>
            <input type="checkbox" id="bookmarksBarToggle" checked>
          </div>
        </div>
        <div class="settings-section">
          <h3>Privacy & Security</h3>
          <div class="setting-item">
            <label>Block Pop-ups</label>
            <input type="checkbox" id="popupBlockToggle" checked>
          </div>
          <div class="setting-item">
            <label>Do Not Track</label>
            <input type="checkbox" id="dntToggle">
          </div>
        </div>
        <div class="settings-section">
          <h3>Search Engine</h3>
          <div class="setting-item">
            <label>Default Search Engine</label>
            <select id="searchEngineSelect" class="setting-select">
              <option value="google">Google</option>
              <option value="duckduckgo">DuckDuckGo</option>
              <option value="bing">Bing</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
